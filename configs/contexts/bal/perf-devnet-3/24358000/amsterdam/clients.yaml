runner:
  client:
    # Override resource limits for BAL purposes. Change is mainly "cpuset_count=4" -> "cpuset_count=6"
    config:
      resource_limits:
        cpuset_count: 6
        cpu_freq: "3600MHz"
        cpu_turboboost: false
        cpu_freq_governor: performance
        memory: "32g"
        swap_disabled: true

  instances:
    # Geth
    - id: geth-bal-sequential-cpu6
      client: geth
      metadata:
        labels:
          bal-mode: sequential
          cpu-count: "6"
      image: ethpandaops/geth:bal-devnet-2
      extra_args:
        - --bal.executionmode=sequential

    - id: geth-bal-full-cpu6
      client: geth
      metadata:
        labels:
          bal-mode: full
          cpu-count: "6"
      image: ethpandaops/geth:bal-devnet-2
      extra_args:
        - --bal.executionmode=full

    - id: geth-bal-nobatchio-cpu6
      client: geth
      metadata:
        labels:
          bal-mode: nobatchio
          cpu-count: "6"
      image: ethpandaops/geth:bal-devnet-2
      extra_args:
        - --bal.executionmode=nobatchio

    # Besu
    - id: besu-bal-sequential-cpu6
      client: besu
      metadata:
        labels:
          bal-mode: sequential
          cpu-count: "6"
      image: ethpandaops/besu:bal-devnet-2-with-prefetch
      extra_args:
        - --Xbal-state-root-timeout=-1
        - --Xbal-processing-timeout=-1
        - --Xbal-optimization-enabled=false
        - --Xbal-perfect-parallelization-enabled=false
        - --Xbal-trust-state-root=false

    - id: besu-bal-full-cpu6
      client: besu
      metadata:
        labels:
          bal-mode: full
          cpu-count: "6"
      image: ethpandaops/besu:bal-devnet-2-with-prefetch
      extra_args:
        - --Xbal-state-root-timeout=-1
        - --Xbal-processing-timeout=-1
        - --Xbal-prefetch-reading-enabled=true
        - --Xbal-trust-state-root=true
        - --Xbal-perfect-parallelization-enabled=true

    - id: besu-bal-nobatchio-cpu6
      client: besu
      metadata:
        labels:
          bal-mode: nobatchio
          cpu-count: "6"
      image: ethpandaops/besu:bal-devnet-2-with-prefetch
      extra_args:
        - --Xbal-state-root-timeout=-1
        - --Xbal-processing-timeout=-1
        - --Xbal-prefetch-reading-enabled=false
        - --bonsai-cache-enabled=true
        - --Xbal-trust-state-root=true
        - --Xbal-perfect-parallelization-enabled=true

    # Reth

    # TODO: Feature flags don't work on bal-devnet-2 branch
    #- id: reth-bal-sequential
    #  client: reth
    #  metadata:
    #    labels:
    #      bal-mode: sequential
    #  image: ethpandaops/reth:bal-devnet-2
    #  extra_args:
    #    - --engine.disable-bal-parallel-execution
    #    - --engine.disable-bal-parallel-state-root
    #    - --engine.disable-bal-batch-io

    - id: reth-bal-full-cpu6
      client: reth
      metadata:
        labels:
          bal-mode: full
          cpu-count: "6"
      image: ethpandaops/reth:bal-devnet-2

    # TODO: Feature flags don't work on bal-devnet-2 branch
    # - id: reth-bal-nobatchio
    #   client: reth
    #   metadata:
    #     labels:
    #       bal-mode: nobatchio
    #   image: ethpandaops/reth:bal-devnet-2
    #   extra_args:
    #     - --engine.disable-bal-batch-io

    # Nethermind

    - id: nethermind-bal-full-cpu6
      client: nethermind
      metadata:
        labels:
          bal-mode: full
          cpu-count: "6"
      image: nethermindeth/nethermind:master
      extra_args:
        - --config=mainnet
        - --FlatDb.Enabled=true
        - --Blocks.ParallelExecution=true # Default is true, but set explicitly for clarity
        - --Blocks.ParallelExecutionBatchRead=true # Default is true, but set explicitly for clarity

    - id: nethermind-bal-sequential-cpu6
      client: nethermind
      metadata:
        labels:
          bal-mode: sequential
          cpu-count: "6"
      image: nethermindeth/nethermind:master
      extra_args:
        - --config=mainnet
        - --FlatDb.Enabled=true
        - --Blocks.ParallelExecution=false
        - --Blocks.ParallelExecutionBatchRead=false

    - id: nethermind-bal-nobatchio-cpu6
      client: nethermind
      metadata:
        labels:
          bal-mode: nobatchio
          cpu-count: "6"
      image: nethermindeth/nethermind:master
      extra_args:
        - --config=mainnet
        - --FlatDb.Enabled=true
        - --Blocks.ParallelExecution=true
        - --Blocks.ParallelExecutionBatchRead=false

    # Erigon

    # TODO: Doesn't provide feature flags yet to enable the different BAL modes

    - id: erigon-bal-full-cpu6
      client: erigon
      metadata:
        labels:
          bal-mode: full
          cpu-count: "6"
      image: ethpandaops/erigon:bal-devnet-2
      extra_args:
        - --override.osaka=1774899169
        - --override.amsterdam=1774899169
        - --fcu.background.commit=false
