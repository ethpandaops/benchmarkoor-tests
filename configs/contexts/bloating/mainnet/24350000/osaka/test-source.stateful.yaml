runner:
  benchmark:
    tests:
      metadata:
        labels:
          name: mainnet-24350000-stateful-bloat
          chain: mainnet
          block: "24350000"
          test-type: stateful
          context: bloating
      source:
        git:
          repo: https://github.com/skylenet/benchmarkoor-raw-tests.git
          version: master
          pre_run_steps:
            - bloating_stateful/mainnet/gas-bump.txt
            - bloating_stateful/mainnet/funding.txt
          steps:
            setup:
              - bloating_stateful/mainnet/setup/*
            test:
              - bloating_stateful/mainnet/testing/*

  # Use podman + checkpoint/restore via CRIU
  container_runtime: podman
  client:
    config:
      rollback_strategy: container-checkpoint-restore
      checkpoint_restore_strategy_options:
        tmpfs_threshold: "10g"
        tmpfs_max_size: "15g"
        wait_after_tcp_drop_connections: 10s
        restart_container: true
